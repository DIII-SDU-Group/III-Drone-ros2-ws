name: iii_dev_launch
root: ~/ws/

enable_pane_titles: true
pane_title_position: top

startup_window: bash

windows:
  - micro-ros-agent:
      layout: even-horizontal
      panes:
        - micro_ros_agent: ros2 run iii_drone_supervision managed_node_wrapper $NODE_MANAGEMENT_CONFIG_DIR/micro_ros_agent.yaml --ros-args --params-file $CONFIG_BASE_DIR/iii_drone/ros_params.yaml
  - sensors:
      layout: tiled
      panes:
        - sensors: ros2 run iii_drone_supervision managed_node_wrapper $NODE_MANAGEMENT_CONFIG_DIR/sensors_sim_launch.yaml --ros-args --params-file $CONFIG_BASE_DIR/iii_drone/ros_params.yaml
  - simulation:
      layout: even-horizontal
      panes:
        - px4_gazebo: ros2 run iii_drone_supervision managed_node_wrapper $SIMULATION_CONFIG_DIR/managed_px4_gazebo_config.yaml --ros-args --params-file $CONFIG_BASE_DIR/iii_drone/ros_params.yaml
        - qgroundcontrol: ros2 run iii_drone_supervision managed_node_wrapper $SIMULATION_CONFIG_DIR/managed_qgroundcontrol_config.yaml --ros-args --params-file $CONFIG_BASE_DIR/iii_drone/ros_params.yaml
  - bash:
