# ~/.config/tmuxinator/iii_dev_launch.yml

name: iii_dev_launch
root: ~/ws/

enable_pane_titles: true
pane_title_position: top

# startup_window: simulation
startup_window: supervisor
# startup_window: configuration

windows:
  - supervisor: 
      layout: even-horizontal
      panes:
        - bash: iii --help
        - supervisor: docker start -a -i iii_drone_supervisor 
  - background-processes:
      layout: even-horizontal
      panes:
        - micro_ros_agent: docker start -a -i iii_drone_micro_ros_agent 
        - tf: docker start -a -i iii_drone_tf 
  - configuration:
      layout: even-horizontal
      panes:
        - configuration_server: docker start -a -i iii_drone_configuration_server 
  - perception:
      layout: tiled
      panes:
        - sensors: docker start -a -i iii_drone_sensors 
        - hough_transformer: docker start -a -i iii_drone_hough_transformer 
        - pl_dir_computer: docker start -a -i iii_drone_pl_dir_computer 
        - pl_mapper: docker start -a -i iii_drone_pl_mapper 
  - control:
      layout: even-horizontal
      panes:
        - trajectory_generator: docker start -a -i iii_drone_trajectory_generator 
        - maneuver_controller: docker start -a -i iii_drone_maneuver_controller 
  - bash:
