name: Dependency Governance

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - staging

permissions:
  contents: read
  pull-requests: write

jobs:
  verify-submodule-lock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify submodule lock
        run: ./scripts/git/verify_submodule_lock.sh

  verify-iii-branch-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Verify III submodule branch policy (base->feature stack)
        run: |
          ./scripts/ci/verify_iii_submodule_branch_policy_ci.sh \
            --base "${{ github.base_ref }}" \
            --feature "${{ github.head_ref }}"

  verify-iii-submodules-on-target-branch:
    if: github.event_name == 'pull_request' && contains(fromJSON('["develop","main","staging"]'), github.base_ref)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Verify III submodule pointers equal origin/${{ github.base_ref }} HEAD
        run: ./scripts/ci/verify_iii_submodule_commits_on_branch_ci.sh --target-branch "${{ github.base_ref }}"

      - name: Upload III submodule status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iii-submodule-status
          path: .ci/iii-submodule-status.tsv
          if-no-files-found: ignore

  comment-iii-submodule-status:
    if: always() && github.event_name == 'pull_request' && contains(fromJSON('["develop","main","staging"]'), github.base_ref)
    runs-on: ubuntu-latest
    needs:
      - verify-iii-submodules-on-target-branch
    steps:
      - name: Download III submodule status artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: iii-submodule-status
          path: .ci

      - name: Upsert PR status comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- iii-submodule-status-bot -->';
            const path = '.ci/iii-submodule-status.tsv';
            let lines = [];
            if (fs.existsSync(path)) {
              lines = fs.readFileSync(path, 'utf8')
                .split('\n')
                .filter(Boolean);
            }

            const rows = [];
            let mismatches = 0;
            for (const line of lines) {
              const [submodule, sha, status, detail] = line.split('\t');
              const shortSha = (sha || '').slice(0, 8);
              if (status === 'MISMATCH') mismatches++;
              rows.push(`| \`${submodule}\` | \`${shortSha}\` | ${status} | ${detail} |`);
            }

            const state = mismatches === 0 ? 'PASS' : 'FAIL';
            const targetBranch = context.payload.pull_request.base.ref;
            const header = `${marker}\n### III Submodule Target Branch Gate (${targetBranch}): ${state}\n`;
            const summary = mismatches === 0
              ? `All pinned III submodule commits exactly match \`origin/${targetBranch}\` HEAD.`
              : `${mismatches} submodule(s) do not match \`origin/${targetBranch}\` HEAD.`;

            const table = rows.length
              ? [
                  '',
                  '| Submodule | Pinned SHA | Status | Detail |',
                  '|---|---:|---|---|',
                  ...rows
                ].join('\n')
              : '\n_No status artifact found._';

            const body = `${header}\n${summary}\n${table}\n`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

  verify-linked-submodule-prs-merged:
    if: github.event_name == 'pull_request' && contains(fromJSON('["develop","main","staging"]'), github.base_ref)
    runs-on: ubuntu-latest
    steps:
      - name: Verify linked III submodule PRs are merged
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const targetBranch = context.payload.pull_request.base.ref;
            const markerRegex = /<!--\s*iii-submodule-pr:\s*path=([^\s]+)\s+url=(https:\/\/github\.com\/([^/\s]+\/[^/\s]+)\/pull\/(\d+))\s*-->/g;
            const prMap = new Map();

            for (const match of body.matchAll(markerRegex)) {
              const [, path, url, repoSlug, pullNumber] = match;
              prMap.set(url, { path, url, repoSlug, pullNumber: Number(pullNumber) });
            }

            if (prMap.size === 0) {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                per_page: 100,
              });
              const changedIIIPaths = files
                .map(file => file.filename)
                .filter(path => path.startsWith('src/III-') || path.startsWith('tools/III-'));

              if (changedIIIPaths.length > 0) {
                core.setFailed(
                  `III submodule paths changed in this workspace PR but no linked submodule PR markers were found: ${changedIIIPaths.join(', ')}`
                );
                return;
              }

              core.info('No linked III submodule PR markers found in the workspace PR body.');
              return;
            }

            const failures = [];
            const rows = [];

            for (const pr of prMap.values()) {
              const [owner, repo] = pr.repoSlug.split('/');
              const response = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.pullNumber,
              });

              const data = response.data;
              const merged = Boolean(data.merged_at);
              const baseMatches = data.base && data.base.ref === targetBranch;
              const state = merged && baseMatches ? 'OK' : 'FAIL';
              let detail = `merged into ${data.base.ref}`;

              if (!merged) {
                detail = `state=${data.state}, merged_at=${data.merged_at || 'null'}`;
                failures.push(`${pr.path}: ${pr.url} is not merged yet`);
              } else if (!baseMatches) {
                detail = `merged into ${data.base.ref}, expected ${targetBranch}`;
                failures.push(`${pr.path}: ${pr.url} merged into ${data.base.ref}, expected ${targetBranch}`);
              }

              rows.push(`| \`${pr.path}\` | ${state} | ${pr.url} | ${detail} |`);
            }

            const summary = [
              `### Linked III Submodule PR Merge Gate (${targetBranch})`,
              '',
              '| Submodule | Status | PR | Detail |',
              '|---|---|---|---|',
              ...rows,
            ].join('\n');

            await core.summary.addRaw(summary).write();

            if (failures.length > 0) {
              core.setFailed(failures.join('\n'));
            }
