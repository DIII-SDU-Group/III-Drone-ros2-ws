name: Dependency Governance

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - staging

permissions:
  contents: read
  pull-requests: write

jobs:
  verify-submodule-lock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify submodule lock
        run: ./scripts/git/verify_submodule_lock.sh

  verify-iii-branch-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Verify III submodule branch policy (base->feature stack)
        run: |
          ./scripts/ci/verify_iii_submodule_branch_policy_ci.sh \
            --base "${{ github.base_ref }}" \
            --feature "${{ github.head_ref }}"

  verify-iii-submodules-on-target-branch:
    if: github.event_name == 'pull_request' && github.base_ref == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Verify III submodule pointers equal origin/develop HEAD
        run: ./scripts/ci/verify_iii_submodule_commits_on_branch_ci.sh --target-branch develop

      - name: Upload III submodule status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iii-submodule-status
          path: .ci/iii-submodule-status.tsv
          if-no-files-found: ignore

  comment-iii-submodule-status:
    if: always() && github.event_name == 'pull_request' && github.base_ref == 'develop'
    runs-on: ubuntu-latest
    needs:
      - verify-iii-submodules-on-target-branch
    steps:
      - name: Download III submodule status artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: iii-submodule-status
          path: .ci

      - name: Upsert PR status comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- iii-submodule-status-bot -->';
            const path = '.ci/iii-submodule-status.tsv';
            let lines = [];
            if (fs.existsSync(path)) {
              lines = fs.readFileSync(path, 'utf8')
                .split('\n')
                .filter(Boolean);
            }

            const rows = [];
            let mismatches = 0;
            for (const line of lines) {
              const [submodule, sha, status, detail] = line.split('\t');
              const shortSha = (sha || '').slice(0, 8);
              if (status === 'MISMATCH') mismatches++;
              rows.push(`| \`${submodule}\` | \`${shortSha}\` | ${status} | ${detail} |`);
            }

            const state = mismatches === 0 ? 'PASS' : 'FAIL';
            const header = `${marker}\n### III Submodule Develop Gate: ${state}\n`;
            const summary = mismatches === 0
              ? 'All pinned III submodule commits exactly match `origin/develop` HEAD.'
              : `${mismatches} submodule(s) do not match \`origin/develop\` HEAD.`;

            const table = rows.length
              ? [
                  '',
                  '| Submodule | Pinned SHA | Status | Detail |',
                  '|---|---:|---|---|',
                  ...rows
                ].join('\n')
              : '\n_No status artifact found._';

            const body = `${header}\n${summary}\n${table}\n`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
