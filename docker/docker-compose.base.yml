services:
  base:
    container_name: iii-base
    build:
      context: ..
      dockerfile: docker/Dockerfile.base
      args:
        ROS_DISTRO: ${ROS_DISTRO}
    image: "iii_drone:base"
  exec_base:
    container_name: iii-exec-base
    build:
      context: ..
      dockerfile: docker/Dockerfile.exec_base
      args:
        ROS_DISTRO: ${ROS_DISTRO}
    image: "iii_drone:exec_base"
    volumes:
      - ..:/home/iii/ws:cached
    depends_on:
      - base

# networks:
#   iii_drone:
#     external: true

networks:
  host:
    external: true