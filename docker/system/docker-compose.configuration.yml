services:
  configuration-server:
    image: "iii_drone:exec_base"
    volumes:
      - ../..:/home/iii/ws:cached
    command: ros2 run iii_drone_configuration configuration_server_node.py --ros-args --params-file ${CONFIG_BASE_DIR}/iii_drone/ros_params.yaml
    environment:
      - CONFIG_BASE_DIR

    networks:
      - iii_drone

networks:
  iii_drone:
    external: true